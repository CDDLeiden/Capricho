name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  tests-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      run: pip install -e ".[dev]"

    - name: Display Environment Information
      run: |
        python -c "import platform; print('Python:', platform.python_version(), '|', platform.system(), platform.release())"
        python -c "import Capricho; print('capricho version:', Capricho.__version__)"
        python -c "import rdkit; print('rdkit version:', rdkit.__version__)"

    - name: Run tests
      run: pytest -xv tests/ --junitxml="test_report.xml"

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: success() || failure()
      with:
        report_paths: 'test_report.xml'

  tests-platform:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: pip install -e ".[dev]"

    - name: Display Environment Information
      run: |
        python -c "import platform; print('Python:', platform.python_version(), '|', platform.system(), platform.release())"
        python -c "import Capricho; print('capricho version:', Capricho.__version__)"
        python -c "import rdkit; print('rdkit version:', rdkit.__version__)"

    - name: Run tests
      run: pytest -xv tests/ --junitxml="test_report.xml"

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: success() || failure()
      with:
        report_paths: 'test_report.xml'
